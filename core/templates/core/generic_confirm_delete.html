{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 mt-16 text-center">
    <div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100">
        <span class="text-3xl">⚠️</span>
    </div>
    <h2 class="text-2xl font-extrabold text-gray-900 mb-2">¿Confirmar Eliminación?</h2>
    <p class="text-gray-600 mb-6 font-medium">Estás a punto de eliminar:<br><strong class="text-lg text-gray-800 block mt-2 p-3 bg-gray-50 rounded border">{{ object }}</strong></p>
    <p class="text-sm text-red-500 mb-8 font-semibold">Esta acción es permanente y no se puede deshacer.</p>
    
    <form method="post" class="flex flex-col space-y-3">
        {% csrf_token %}
        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow">Sí, Eliminar Permanentemente</button>
        <a href="javascript:history.back()" class="w-full bg-white hover:bg-gray-50 text-gray-800 font-bold py-3 px-6 rounded-lg transition-colors border border-gray-300">Cancelar</a>
    </form>
</div>
{% endblock %}
