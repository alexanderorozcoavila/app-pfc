{% extends 'core/generic_form.html' %}

{% block form_scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const planTypeSelect = document.getElementById("id_plan_type");
        const incomeP = document.getElementById("id_income_source").parentElement;
        const categoryP = document.getElementById("id_category").parentElement;
        
        function toggleFields() {
            const val = planTypeSelect.value;
            if (val === 'ingreso') {
                incomeP.style.display = 'flex';
                categoryP.style.display = 'none';
            } else {
                incomeP.style.display = 'none';
                categoryP.style.display = 'flex';
            }
        }
        
        planTypeSelect.addEventListener('change', toggleFields);
        toggleFields(); // Carga inicial
    });
</script>
{% endblock %}
